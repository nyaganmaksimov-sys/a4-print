<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>А4-ПРИНТ ДАРИТ СКИДКИ! 🎰</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированные частицы фона */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 20%),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 20%),
                        radial-gradient(circle at 40% 80%, rgba(255,215,0,0.1) 0%, transparent 30%),
                        radial-gradient(circle at 90% 20%, rgba(255,105,180,0.1) 0%, transparent 30%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-2%, -2%) rotate(1deg); }
            75% { transform: translate(2%, 2%) rotate(-1deg); }
        }

        /* НОВЫЙ КОНТЕЙНЕР ДЛЯ БАННЕРА И ОСНОВНОГО КОНТЕНТА */
        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        /* СТИЛИ ДЛЯ БАННЕРА СЛЕВА */
        .banner-left {
            flex: 0 0 200px;
            animation: bannerFloat 3s ease-in-out infinite;
        }

        @keyframes bannerFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        .banner-image {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 3px rgba(255,255,255,0.5), 0 0 0 6px rgba(0,174,239,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .banner-image:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 25px 50px rgba(236,0,140,0.4), 0 0 0 4px rgba(255,255,255,0.6), 0 0 0 8px rgba(236,0,140,0.3);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.5) inset;
            max-width: 600px;
            width: 100%;
            position: relative;
            animation: glow 3s ease-in-out infinite;
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.5) inset; }
            50% { box-shadow: 0 25px 70px rgba(255,215,0,0.4), 0 0 0 3px rgba(255,255,255,0.8) inset; }
        }

        /* НОВЫЙ КОНТЕЙНЕР ДЛЯ ЛОГОТИПА НАД КОЛЕСОМ */
        .top-logo {
            margin-bottom: 20px;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .top-logo-image {
            max-width: 200px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .top-logo-image:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(236,0,140,0.3);
        }

        h1 {
            color: #00AEEF;
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 5px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0 rgba(236,0,140,0.3), 6px 6px 0 rgba(255,242,0,0.2);
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .subtitle {
            color: #2D2D2D;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
            animation: wheelFloat 4s ease-in-out infinite;
        }

        @keyframes wheelFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #wheelCanvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 5px rgba(255,255,255,0.5), 0 0 0 8px rgba(0,174,239,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #ffffff, #f0f0f0);
            animation: rotateGlow 3s linear infinite;
        }

        #wheelCanvas.disabled {
            opacity: 0.7;
            filter: grayscale(50%);
            cursor: not-allowed;
            animation: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 5px rgba(255,255,255,0.5), 0 0 0 8px rgba(128,128,128,0.3);
        }

        @keyframes rotateGlow {
            0% { box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 5px rgba(255,255,255,0.5), 0 0 0 8px rgba(0,174,239,0.3); }
            50% { box-shadow: 0 25px 50px rgba(236,0,140,0.4), 0 0 0 6px rgba(255,255,255,0.6), 0 0 0 10px rgba(236,0,140,0.3); }
            100% { box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 5px rgba(255,255,255,0.5), 0 0 0 8px rgba(0,174,239,0.3); }
        }

        /* Объемный центр с логотипом */
        .spin-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #e0e0e0);
            border: 4px solid #2D2D2D;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 0 3px rgba(255,255,255,0.8) inset, 0 0 0 5px rgba(0,174,239,0.3);
            pointer-events: none;
            animation: pulse3D 2s ease-in-out infinite;
        }

        @keyframes pulse3D {
            0%, 100% { 
                box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 0 3px rgba(255,255,255,0.8) inset, 0 0 0 5px rgba(0,174,239,0.3);
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                box-shadow: 0 15px 30px rgba(236,0,140,0.4), 0 0 0 4px rgba(255,255,255,0.9) inset, 0 0 0 8px rgba(236,0,140,0.3);
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        #centerLogo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            pointer-events: none;
            border-radius: 50%;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        @media (max-width: 400px) {
            .spin-center {
                width: 70px;
                height: 70px;
            }
            #centerLogo {
                width: 50px;
                height: 50px;
            }
        }

        .result-message {
            background: linear-gradient(145deg, #00AEEF, #0099cc);
            color: white;
            padding: 20px;
            border-radius: 60px;
            font-size: 1.3rem;
            margin: 20px 0;
            font-weight: bold;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #FFF200;
            text-shadow: 2px 2px 0 #2D2D2D;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.5) inset;
            animation: resultGlow 2s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        @keyframes resultGlow {
            0%, 100% { box-shadow: 0 10px 20px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.5) inset; }
            50% { box-shadow: 0 15px 30px rgba(255,242,0,0.3), 0 0 0 3px rgba(255,255,255,0.8) inset; }
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            color: #EC008C;
            margin: 10px 0;
            text-shadow: 2px 2px 0 #FFF200;
            animation: timerPulse 1s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .rules {
            text-align: left;
            background: rgba(249, 249, 249, 0.9);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 20px;
            color: #2D2D2D;
            border-left: 5px solid #EC008C;
            border-right: 5px solid #00AEEF;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .rules p {
            margin: 8px 0;
            transition: transform 0.2s ease;
        }

        .rules p:hover {
            transform: translateX(10px);
            color: #EC008C;
        }

        .rules strong {
            color: #EC008C;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 900px) {
            .main-wrapper {
                flex-direction: column;
            }
            
            .banner-left {
                flex: 0 0 auto;
                width: 80%;
                max-width: 300px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- НОВАЯ ОБЕРТКА С БАННЕРОМ СЛЕВА -->
    <div class="main-wrapper">
        <!-- БАННЕР СЛЕВА -->
        <div class="banner-left">
            <img src="banner.png" alt="Баннер акции" class="banner-image" onclick="window.open('https://a4-print.ru', '_blank')">
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="container">
            <!-- ЛОГОТИП НАД КОЛЕСОМ -->
            <div class="top-logo">
                <img src="images/logo.png" alt="А4-ПРИНТ" class="top-logo-image">
            </div>

            <h1>А4-ПРИНТ ДАРИТ СКИДКИ</h1>
            <p class="subtitle">Крути барабан и забирай приз!</p>

            <div class="wheel-container">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                
                <div class="spin-center">
                    <img src="images/logo_soc.png" alt="Логотип" id="centerLogo">
                </div>
            </div>

            <div id="timer" class="timer"></div>

            <div id="result" class="result-message">
                Нажми на колесо, чтобы испытать удачу
            </div>
            
            <div class="rules">
                <p>🎁 <strong>Скидки от 5% до 50%:</strong> Крути и выигрывай!</p>
                <p>🖼️ <strong>Рамочки в подарок:</strong> Фоторамка или рамка с вашим фото</p>
                <p>🏆 <strong>Джекпот:</strong> Скидка 50% на весь заказ!</p>
                <p>⏱️ <strong>Таймер:</strong> 30 секунд между прокрутками</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');
        const timerDiv = document.getElementById('timer');

        // НАСТРОЙКИ СЕКТОРОВ
        const segments = [
            { 
                label: '5%', 
                description: '🎁 Скидка 5% на текущий заказ!', 
                color: '#FFB6C1'
            },
            { 
                label: '10%', 
                description: '🎁 Скидка 10% на текущий заказ!', 
                color: '#FFD700'
            },
            { 
                label: '15%', 
                description: '🎁 Скидка 15% на текущий заказ!', 
                color: '#98FB98'
            },
            { 
                label: '20%', 
                description: '🎁 Скидка 20% на текущий заказ!', 
                color: '#87CEEB'
            },
            { 
                label: '25%', 
                description: '🎁 Скидка 25% на текущий заказ!', 
                color: '#DDA0DD'
            },
            { 
                label: '30%', 
                description: '🎁 Скидка 30% на текущий заказ!', 
                color: '#F0E68C'
            },
            { 
                label: '40%', 
                description: '🎁 Скидка 40% на текущий заказ!', 
                color: '#FFA07A'
            },
            { 
                label: '50%', 
                description: '🏆 ДЖЕКПОТ: Скидка 50% на заказ! 🏆', 
                color: '#FF4500'
            },
            { 
                label: 'РАМКА', 
                description: '🖼️ РАМОЧКА ДЛЯ ФОТО в подарок + скидка 10% на фотоуслуги!', 
                color: '#00AEEF'
            },
            { 
                label: 'ФОТО+РАМКА', 
                description: '🖼️ РАМОЧКА с вашим снимком! Мы печатаем фото и дарим в рамке', 
                color: '#EC008C'
            }
        ];

        let currentAngle = 0;
        let isSpinning = false;
        let spinTimeout = null;
        let spinCounter = 0;
        let isBlocked = false;
        let timerInterval = null;
        let timeLeft = 0;

        // Функция для создания объемного эффекта на секторах
        function draw3DSegment(startAngle, endAngle, color, isEven) {
            const gradient = ctx.createRadialGradient(
                canvas.width / 2 - 20, canvas.height / 2 - 20, 10,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            
            if (isEven) {
                gradient.addColorStop(0, color);
                gradient.addColorStop(0.7, shadeColor(color, -30));
                gradient.addColorStop(1, shadeColor(color, -50));
            } else {
                gradient.addColorStop(0, color);
                gradient.addColorStop(0.7, shadeColor(color, -20));
                gradient.addColorStop(1, shadeColor(color, -40));
            }
            
            ctx.fillStyle = gradient;
            
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, canvas.height / 2);
            ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 10, startAngle, endAngle);
            ctx.closePath();
            ctx.fill();
            
            // Добавляем блик
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, canvas.height / 2);
            ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 10, startAngle, endAngle);
            ctx.closePath();
            ctx.clip();
            
            const highlightGradient = ctx.createRadialGradient(
                canvas.width / 2 - 30, canvas.height / 2 - 30, 10,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            highlightGradient.addColorStop(0, 'rgba(255,255,255,0.3)');
            highlightGradient.addColorStop(0.5, 'rgba(255,255,255,0)');
            
            ctx.fillStyle = highlightGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        // Вспомогательная функция для затемнения цвета
        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);
            
            R = Math.min(255, Math.max(0, R + R * percent / 100));
            G = Math.min(255, Math.max(0, G + G * percent / 100));
            B = Math.min(255, Math.max(0, B + B * percent / 100));
            
            return `rgb(${R}, ${G}, ${B})`;
        }

        // Рисуем объемное колесо
        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const arc = (Math.PI * 2) / segments.length;
            
            // Рисуем тень под колесом
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 5;
            
            // Рисуем фон колеса с градиентом
            const wheelGradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 10,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            wheelGradient.addColorStop(0, '#f0f0f0');
            wheelGradient.addColorStop(1, '#d0d0d0');
            
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 8, 0, Math.PI * 2);
            ctx.fillStyle = wheelGradient;
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            
            for (let i = 0; i < segments.length; i++) {
                const startAngle = i * arc + angle;
                const endAngle = (i + 1) * arc + angle;
                
                // Рисуем 3D сектор
                draw3DSegment(startAngle, endAngle, segments[i].color, i % 2 === 0);
                
                // Рисуем объемные разделители
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.lineTo(
                    canvas.width / 2 + Math.cos(startAngle) * (canvas.width / 2 - 10),
                    canvas.height / 2 + Math.sin(startAngle) * (canvas.height / 2 - 10)
                );
                ctx.stroke();
                
                // Добавляем текст с тенью
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(startAngle + arc / 2);
                ctx.textAlign = 'center';
                
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 5;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                
                if (segments[i].color === '#2D2D2D' || segments[i].color === '#EC008C' || segments[i].color === '#FF4500') {
                    ctx.fillStyle = '#FFFFFF';
                } else {
                    ctx.fillStyle = '#000000';
                }
                
                if (segments[i].label === 'ФОТО+РАМКА') {
                    ctx.font = 'bold ' + (canvas.width / 24) + 'px "Segoe UI"';
                } else {
                    ctx.font = 'bold ' + (canvas.width / 20) + 'px "Segoe UI"';
                }
                
                ctx.fillText(segments[i].label, canvas.width / 4, 15);
                ctx.restore();
            }
            
            // Рисуем объемный указатель
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 3;
            
            // Основа стрелки
            ctx.fillStyle = '#EC008C';
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 15, 5);
            ctx.lineTo(canvas.width / 2, 25);
            ctx.lineTo(canvas.width / 2 + 15, 5);
            ctx.closePath();
            ctx.fill();
            
            // Блик на стрелке
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 12, 8);
            ctx.lineTo(canvas.width / 2, 20);
            ctx.lineTo(canvas.width / 2 + 12, 8);
            ctx.closePath();
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
        }

        // Функция для запуска таймера
        function startTimer(seconds) {
            isBlocked = true;
            timeLeft = seconds;
            canvas.classList.add('disabled');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDiv.innerHTML = `⏳ ${timeLeft} сек`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    isBlocked = false;
                    canvas.classList.remove('disabled');
                    timerDiv.innerHTML = '✅ Можно крутить!';
                    
                    setTimeout(() => {
                        timerDiv.innerHTML = '';
                    }, 3000);
                }
            }, 1000);
        }

        // Функция вращения
        function spinWheel() {
            if (isSpinning || isBlocked) {
                if (isBlocked) {
                    resultDiv.innerHTML = '⏳ Подожди ' + timeLeft + ' секунд до следующего вращения!';
                }
                return;
            }
            
            isSpinning = true;
            resultDiv.style.background = 'linear-gradient(145deg, #00AEEF, #0099cc)';
            resultDiv.innerHTML = '🎰 Крутим... 🎰';
            
            spinCounter++;
            
            let prizeIndex;
            
            if (spinCounter % 2 === 0) {
                prizeIndex = 0;
                console.log('Гарантированная 5% (прокрут #' + spinCounter + ')');
            } else {
                prizeIndex = Math.floor(Math.random() * segments.length);
                console.log('Случайный приз (прокрут #' + spinCounter + ')');
            }
            
            const prize = segments[prizeIndex];
            
            const segmentAngle = (Math.PI * 2) / segments.length;
            const targetAngle = (-Math.PI / 2) - (prizeIndex * segmentAngle) - (segmentAngle / 2);
            
            const spins = Math.floor(Math.random() * 5) + 8;
            const finalAngle = targetAngle - (spins * Math.PI * 2);
            
            const startAngle = 0;
            const startTime = Date.now();
            const spinTime = 4000;
            
            currentAngle = startAngle;
            drawWheel(currentAngle);
            
            function animateSpin() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinTime, 1);
                
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                currentAngle = startAngle + (finalAngle - startAngle) * easeProgress;
                
                drawWheel(currentAngle);
                
                if (progress < 1) {
                    spinTimeout = requestAnimationFrame(animateSpin);
                } else {
                    resultDiv.innerHTML = `🎁 <strong>ТВОЙ ПРИЗ:</strong> ${prize.description}`;
                    resultDiv.style.background = 'linear-gradient(145deg, #EC008C, #c00070)';
                    
                    isSpinning = false;
                    
                    startTimer(30);
                }
            }
            
            animateSpin();
        }

        drawWheel(0);
        canvas.addEventListener('click', spinWheel);

        window.addEventListener('resize', () => {
            drawWheel(currentAngle);
        });

        // Обработчики ошибок загрузки изображений
        const topLogo = document.querySelector('.top-logo-image');
        topLogo.onerror = function() {
            console.log('Логотип не загружен, проверьте путь images/logo.png');
            this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><rect width="200" height="100" fill="%2300AEEF"/><text x="100" y="65" font-size="40" text-anchor="middle" fill="white">А4-ПРИНТ</text></svg>';
        };

        const banner = document.querySelector('.banner-image');
        banner.onerror = function() {
            console.log('Баннер не загружен, проверьте путь banner.png');
            this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400"><rect width="200" height="400" fill="%23EC008C"/><text x="100" y="200" font-size="30" text-anchor="middle" fill="white">АКЦИЯ</text></svg>';
        };

        const centerLogo = document.getElementById('centerLogo');
        centerLogo.onerror = function() {
            console.log('Логотип не загружен, проверьте путь images/logo_soc.png');
            this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%2300AEEF"/><text x="50" y="70" font-size="50" text-anchor="middle" fill="white">A4</text></svg>';
        };
    </script>
