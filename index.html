<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>НАШ ПРИНТЕР ДАРИТ СКИДКИ! 🎰</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00AEEF 0%, #EC008C 50%, #FFF200 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #00AEEF;
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #FFF200, 4px 4px 0 #EC008C;
        }

        .subtitle {
            color: #2D2D2D;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        #wheelCanvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            cursor: pointer;
        }

        /* Центр с логотипом */
        .spin-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            border: 4px solid #2D2D2D;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 174, 239, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(0, 174, 239, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 174, 239, 0);
            }
        }

        #centerLogo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            pointer-events: none;
            border-radius: 50%;
        }

        @media (max-width: 400px) {
            .spin-center {
                width: 70px;
                height: 70px;
            }
            #centerLogo {
                width: 50px;
                height: 50px;
            }
        }

        .result-message {
            background: #00AEEF;
            color: white;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.2rem;
            margin: 20px 0;
            font-weight: bold;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #FFF200;
            text-shadow: 1px 1px 0 #2D2D2D;
        }

        .rules {
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 20px;
            color: #2D2D2D;
            border-left: 5px solid #EC008C;
            border-right: 5px solid #00AEEF;
        }

        .rules p {
            margin: 8px 0;
        }

        .rules strong {
            color: #EC008C;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 НАШ ПРИНТЕР ДАРИТ СКИДКИ! 🎉</h1>
        <p class="subtitle">Крути барабан и забирай приз!</p>

        <div class="wheel-container">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            
            <!-- Центр только с логотипом -->
            <div class="spin-center">
                <img src="images/logo_soc.png" alt="Логотип" id="centerLogo">
            </div>
        </div>

        <div id="result" class="result-message">
            Нажми на колесо, чтобы испытать удачу
        </div>
        
        <div class="rules">
            <p>✨ <strong>Как получить попытку:</strong> Сделай заказ от 300₽ (или просто приди на открытие) и крути!</p>
            <p>🏆 <strong>Джекпот:</strong> Заказ до 500₽ в подарок!</p>
            <p>🎨 <strong>Фирменные цвета CMYK:</strong> Голубой, Пурпурный, Жёлтый, Чёрный</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');

        // Настройки секторов
        const segments = [
            { label: '10%', description: 'Скидка 10% на этот заказ!', color: '#00AEEF' },
            { label: '20%', description: 'Скидка 20% на этот заказ!', color: '#EC008C' },
            { label: '5 Фото', description: '+5 фото 10x15 в подарок!', color: '#FFF200' },
            { label: 'Ламинация', description: 'Ламинирование в подарок!', color: '#2D2D2D' },
            { label: '30% след.', description: 'Купон: 30% на следующий заказ!', color: '#00AEEF' },
            { label: 'ДЖЕКПОТ', description: '🎉 ЗАКАЗ БЕСПЛАТНО (до 500₽)! 🎉', color: '#EC008C' }
        ];

        // ФИКСИРОВАННЫЙ начальный угол (всегда начинаем с одной точки)
        let currentAngle = 0;
        let isSpinning = false;
        let spinTimeout = null;

        // Рисуем колесо
        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const arc = (Math.PI * 2) / segments.length;
            
            for (let i = 0; i < segments.length; i++) {
                const startAngle = i * arc + angle;
                const endAngle = (i + 1) * arc + angle;
                
                // Рисуем сектор
                ctx.beginPath();
                ctx.fillStyle = segments[i].color;
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 10, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();
                
                // Рисуем обводку
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 10, startAngle, endAngle);
                ctx.closePath();
                ctx.stroke();
                
                // Добавляем текст
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(startAngle + arc / 2);
                ctx.textAlign = 'center';
                
                // Выбираем цвет текста
                if (segments[i].color === '#2D2D2D' || segments[i].color === '#EC008C') {
                    ctx.fillStyle = '#FFFFFF';
                } else {
                    ctx.fillStyle = '#000000';
                }
                
                ctx.font = 'bold ' + (canvas.width / 18) + 'px "Segoe UI"';
                ctx.fillText(segments[i].label, canvas.width / 4, 10);
                ctx.restore();
            }
            
            // Рисуем указатель (стрелку сверху)
            ctx.fillStyle = '#EC008C';
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 15, 5);
            ctx.lineTo(canvas.width / 2, 25);
            ctx.lineTo(canvas.width / 2 + 15, 5);
            ctx.fill();
            
            ctx.strokeStyle = '#FFF200';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Функция вращения (УЛУЧШЕННАЯ - каждый раз сбрасываем угол)
        function spinWheel() {
            if (isSpinning) return;
            
            isSpinning = true;
            resultDiv.style.background = '#00AEEF';
            resultDiv.innerHTML = '🎰 Крутим... 🎰';
            
            // 1. Случайно выбираем приз
            const prizeIndex = Math.floor(Math.random() * segments.length);
            const prize = segments[prizeIndex];
            
            // 2. Вычисляем угол для этого приза
            const segmentAngle = (Math.PI * 2) / segments.length;
            
            // Стрелка вверх (-PI/2). Нужно, чтобы центр сектора был под стрелкой
            const targetAngle = (-Math.PI / 2) - (prizeIndex * segmentAngle) - (segmentAngle / 2);
            
            // 3. Добавляем много оборотов для красоты (8-12 оборотов)
            const spins = Math.floor(Math.random() * 5) + 8; // 8-12 оборотов
            const finalAngle = targetAngle - (spins * Math.PI * 2);
            
            // 4. ВАЖНО: начинаем всегда с 0 (фиксированная точка)
            const startAngle = 0;
            const startTime = Date.now();
            const spinTime = 4000; // 4 секунды
            
            // Устанавливаем начальный угол в 0 перед вращением
            currentAngle = startAngle;
            drawWheel(currentAngle);
            
            function animateSpin() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinTime, 1);
                
                // Эффект замедления (ease-out)
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                // Плавно двигаемся от 0 к конечному углу
                currentAngle = startAngle + (finalAngle - startAngle) * easeProgress;
                
                drawWheel(currentAngle);
                
                if (progress < 1) {
                    spinTimeout = requestAnimationFrame(animateSpin);
                } else {
                    // Колесо остановилось - показываем приз
                    resultDiv.innerHTML = `🎁 <strong>ТВОЙ ПРИЗ:</strong> ${prize.description}`;
                    resultDiv.style.background = '#EC008C';
                    
                    console.log('Выпал приз:', prize.label, 'Оборотов:', spins);
                    
                    isSpinning = false;
                }
            }
            
            animateSpin();
        }

        // Инициализация - начинаем с угла 0
        drawWheel(0);

        // Клик по canvas для вращения
        canvas.addEventListener('click', spinWheel);

        // Адаптивность
        window.addEventListener('resize', () => {
            drawWheel(currentAngle);
        });

        // Проверка логотипа
        const logo = document.getElementById('centerLogo');
        logo.onerror = function() {
            console.log('Логотип не загружен, проверьте путь images/logo_soc.png');
            this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%2300AEEF"/><text x="50" y="70" font-size="50" text-anchor="middle" fill="white">A4</text></svg>';
        };
    </script>
</body>
</html>
