<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>А4-ПРИНТ ДАРИТ СКИДКИ! 🎰</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00AEEF 0%, #EC008C 50%, #FFF200 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #00AEEF;
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #FFF200, 4px 4px 0 #EC008C;
        }

        .subtitle {
            color: #2D2D2D;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        #wheelCanvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            cursor: pointer;
        }

        /* Центр с логотипом */
        .spin-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            border: 4px solid #2D2D2D;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 174, 239, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(0, 174, 239, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 174, 239, 0);
            }
        }

        #centerLogo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            pointer-events: none;
            border-radius: 50%;
        }

        @media (max-width: 400px) {
            .spin-center {
                width: 70px;
                height: 70px;
            }
            #centerLogo {
                width: 50px;
                height: 50px;
            }
        }

        .result-message {
            background: #00AEEF;
            color: white;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.2rem;
            margin: 20px 0;
            font-weight: bold;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #FFF200;
            text-shadow: 1px 1px 0 #2D2D2D;
        }

        .rules {
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 20px;
            color: #2D2D2D;
            border-left: 5px solid #EC008C;
            border-right: 5px solid #00AEEF;
        }

        .rules p {
            margin: 8px 0;
        }

        .rules strong {
            color: #EC008C;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 А4-ПРИНТ ДАРИТ СКИДКИ! 🎉</h1>
        <p class="subtitle">Крути барабан и забирай приз!</p>

        <div class="wheel-container">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            
            <!-- Центр только с логотипом -->
            <div class="spin-center">
                <img src="images/logo_soc.png" alt="Логотип" id="centerLogo">
            </div>
        </div>

        <div id="result" class="result-message">
            Нажми на колесо, чтобы испытать удачу
        </div>
        
        <div class="rules">
            <p>🎁 <strong>Скидки от 5% до 50%:</strong> Крути и выигрывай!</p>
            <p>🖼 <strong>Рамочки в подарок:</strong> Фоторамка или рамка с вашим фото</p>
            <p>🏆 <strong>Джекпот:</strong> Скидка 50% на весь заказ!</p>
             </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');

        // НОВЫЕ НАСТРОЙКИ СЕКТОРОВ (только скидки + рамочки)
        const segments = [
            { 
                label: '5%', 
                description: '🎁 Скидка 5% на текущий заказ!', 
                color: '#FFB6C1', // Светло-розовый
                emoji: '🎁'
            },
            { 
                label: '10%', 
                description: '🎁 Скидка 10% на текущий заказ!', 
                color: '#FFD700', // Золотой
                emoji: '🎁'
            },
            { 
                label: '15%', 
                description: '🎁 Скидка 15% на текущий заказ!', 
                color: '#98FB98', // Салатовый
                emoji: '🎁'
            },
            { 
                label: '20%', 
                description: '🎁 Скидка 20% на текущий заказ!', 
                color: '#87CEEB', // Небесно-голубой
                emoji: '🎁'
            },
            { 
                label: '25%', 
                description: '🎁 Скидка 25% на текущий заказ!', 
                color: '#DDA0DD', // Сливовый
                emoji: '🎁'
            },
            { 
                label: '30%', 
                description: '🎁 Скидка 30% на текущий заказ!', 
                color: '#F0E68C', // Хаки
                emoji: '🎁'
            },
            { 
                label: '40%', 
                description: '🎁 Скидка 40% на текущий заказ!', 
                color: '#FFA07A', // Светло-лососевый
                emoji: '🎁'
            },
            { 
                label: '50%', 
                description: '🏆 ДЖЕКПОТ: Скидка 50% на заказ! 🏆', 
                color: '#FF4500', // Оранжево-красный (яркий)
                emoji: '🏆'
            },
            { 
                label: 'РАМКА', 
                description: 'РАМОЧКА ДЛЯ ФОТО в подарок + скидка 10% на фотоуслуги!', 
                color: '#00AEEF', // Голубой (CMYK)
                emoji: ''
            },
            { 
                label: 'ФОТО', 
                description: 'РАМОЧКА с вашим снимком! Мы печатаем фото и дарим в рамке', 
                color: '#EC008C', // Пурпурный (CMYK)
                emoji: ''
            }
        ];

        // ФИКСИРОВАННЫЙ начальный угол
        let currentAngle = 0;
        let isSpinning = false;
        let spinTimeout = null;

        // Рисуем колесо
        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const arc = (Math.PI * 2) / segments.length;
            
            for (let i = 0; i < segments.length; i++) {
                const startAngle = i * arc + angle;
                const endAngle = (i + 1) * arc + angle;
                
                // Рисуем сектор
                ctx.beginPath();
                ctx.fillStyle = segments[i].color;
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 10, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();
                
                // Рисуем обводку (белые разделители)
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 10, startAngle, endAngle);
                ctx.closePath();
                ctx.stroke();
                
                // Добавляем текст
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(startAngle + arc / 2);
                ctx.textAlign = 'center';
                
                // Выбираем цвет текста
                if (segments[i].color === '#2D2D2D' || segments[i].color === '#EC008C' || segments[i].color === '#FF4500') {
                    ctx.fillStyle = '#FFFFFF';
                } else {
                    ctx.fillStyle = '#000000';
                }
                
                ctx.font = 'bold ' + (canvas.width / 22) + 'px "Segoe UI"';
                
                // Разбиваем текст на две строки для длинных надписей
                const lines = segments[i].label.split(' ');
                if (lines.length > 1) {
                    ctx.fillText(lines[0], canvas.width / 4, 5);
                    ctx.fillText(lines[1], canvas.width / 4, 25);
                } else {
                    ctx.fillText(segments[i].label, canvas.width / 4, 15);
                }
                
                ctx.restore();
            }
            
            // Рисуем указатель (стрелку сверху)
            ctx.fillStyle = '#EC008C';
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 15, 5);
            ctx.lineTo(canvas.width / 2, 25);
            ctx.lineTo(canvas.width / 2 + 15, 5);
            ctx.fill();
            
            ctx.strokeStyle = '#FFF200';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Функция вращения
        function spinWheel() {
            if (isSpinning) return;
            
            isSpinning = true;
            resultDiv.style.background = '#00AEEF';
            resultDiv.innerHTML = '🎰 Крутим... 🎰';
            
            // Случайно выбираем приз
            const prizeIndex = Math.floor(Math.random() * segments.length);
            const prize = segments[prizeIndex];
            
            // Вычисляем угол для этого приза
            const segmentAngle = (Math.PI * 2) / segments.length;
            
            // Стрелка вверх (-PI/2). Нужно, чтобы центр сектора был под стрелкой
            const targetAngle = (-Math.PI / 2) - (prizeIndex * segmentAngle) - (segmentAngle / 2);
            
            // Добавляем случайное количество оборотов (8-12)
            const spins = Math.floor(Math.random() * 5) + 8;
            const finalAngle = targetAngle - (spins * Math.PI * 2);
            
            // Начинаем всегда с 0
            const startAngle = 0;
            const startTime = Date.now();
            const spinTime = 4000; // 4 секунды
            
            currentAngle = startAngle;
            drawWheel(currentAngle);
            
            function animateSpin() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinTime, 1);
                
                // Эффект замедления
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                currentAngle = startAngle + (finalAngle - startAngle) * easeProgress;
                
                drawWheel(currentAngle);
                
                if (progress < 1) {
                    spinTimeout = requestAnimationFrame(animateSpin);
                } else {
                    // Показываем приз
                    resultDiv.innerHTML = `🎁 <strong>ТВОЙ ПРИЗ:</strong> ${prize.description}`;
                    resultDiv.style.background = '#EC008C';
                    
                    console.log('Выпал приз:', prize.label);
                    
                    isSpinning = false;
                }
            }
            
            animateSpin();
        }

        // Инициализация
        drawWheel(0);

        // Клик по canvas для вращения
        canvas.addEventListener('click', spinWheel);

        // Адаптивность
        window.addEventListener('resize', () => {
            drawWheel(currentAngle);
        });

        // Проверка логотипа
        const logo = document.getElementById('centerLogo');
        logo.onerror = function() {
            console.log('Логотип не загружен, проверьте путь images/logo_soc.png');
            this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%2300AEEF"/><text x="50" y="70" font-size="50" text-anchor="middle" fill="white">A4</text></svg>';
        };
    </script>
</body>
</html>
