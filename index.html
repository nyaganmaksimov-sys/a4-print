<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>НАШ ПРИНТЕР ДАРИТ СКИДКИ! 🎰</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        #wheelCanvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            cursor: pointer;
        }

        /* Новый стиль для центра с логотипом */
        .spin-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            border: 4px solid #ff6b6b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        #centerLogo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            margin-bottom: 2px;
            pointer-events: none;
        }

        #spinButton {
            width: 60px;
            height: 30px;
            border-radius: 20px;
            background: #ff6b6b;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: auto;
            margin-top: 2px;
        }

        #spinButton:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        #spinButton:active {
            transform: scale(0.95);
        }

        #spinButton:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Адаптивность для маленьких экранов */
        @media (max-width: 400px) {
            .spin-center {
                width: 70px;
                height: 70px;
            }
            #centerLogo {
                width: 30px;
                height: 30px;
            }
            #spinButton {
                width: 50px;
                height: 25px;
                font-size: 0.6rem;
            }
        }

        .result-message {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.2rem;
            margin: 20px 0;
            font-weight: bold;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #667eea;
        }

        .rules {
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 20px;
            color: #555;
        }

        .rules p {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 НАШ ПРИНТЕР ДАРИТ СКИДКИ! 🎉</h1>
        <p class="subtitle">Крути барабан и забирай приз!</p>

        <div class="wheel-container">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            
            <!-- Центр с логотипом и кнопкой -->
            <div class="spin-center">
                <img src="images/logo_soc.png" alt="Логотип" id="centerLogo">
                <button id="spinButton">КРУТИТЬ!</button>
            </div>
        </div>

        <div id="result" class="result-message">
            Нажми на кнопку, чтобы испытать удачу
        </div>
        
        <div class="rules">
            <p>✨ <strong>Как получить попытку:</strong> Сделай заказ от 300₽ (или просто приди на открытие) и крути!</p>
            <p>🏆 <strong>Джекпот:</strong> Заказ до 500₽ в подарок!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinButton = document.getElementById('spinButton');
        const resultDiv = document.getElementById('result');

        // Настройки секторов (Цвета и призы)
        const segments = [
            { label: '10%', description: 'Скидка 10% на этот заказ!', color: '#FF6B6B' },
            { label: '20%', description: 'Скидка 20% на этот заказ!', color: '#4ECDC4' },
            { label: '5 Фото', description: '+5 фото 10x15 в подарок!', color: '#45B7D1' },
            { label: 'Ламинация', description: 'Ламинирование в подарок!', color: '#96CEB4' },
            { label: '30% след.', description: 'Купон: 30% на следующий заказ!', color: '#FFE194' },
            { label: 'ДЖЕКПОТ', description: '🎉 ЗАКАЗ БЕСПЛАТНО (до 500₽)! 🎉', color: '#F7D794' }
        ];

        let currentAngle = 0;
        let isSpinning = false;
        let spinTimeout = null;

        // Рисуем колесо
        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const arc = (Math.PI * 2) / segments.length;
            
            for (let i = 0; i < segments.length; i++) {
                const startAngle = i * arc + angle;
                const endAngle = (i + 1) * arc + angle;
                
                // Рисуем сектор
                ctx.beginPath();
                ctx.fillStyle = segments[i].color;
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 10, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();
                
                // Рисуем обводку
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 10, startAngle, endAngle);
                ctx.closePath();
                ctx.stroke();
                
                // Добавляем текст
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(startAngle + arc / 2);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#000';
                ctx.font = 'bold ' + (canvas.width / 20) + 'px "Segoe UI"';
                ctx.fillText(segments[i].label, canvas.width / 4, 10);
                ctx.restore();
            }
            
            // Рисуем центральный круг (будет скрыт логотипом, но оставим для красоты)
            ctx.beginPath();
            ctx.fillStyle = '#333';
            ctx.arc(canvas.width / 2, canvas.height / 2, 20, 0, 2 * Math.PI);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Рисуем указатель (стрелку сверху)
            ctx.fillStyle = '#ff0';
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 15, 5);
            ctx.lineTo(canvas.width / 2, 25);
            ctx.lineTo(canvas.width / 2 + 15, 5);
            ctx.fill();
        }

        // Функция для определения выигрыша
        function getPrize(angle) {
            const rawAngle = angle % (Math.PI * 2);
            const segmentAngle = (Math.PI * 2) / segments.length;
            
            let index = Math.floor(((Math.PI * 2) - rawAngle) / segmentAngle) % segments.length;
            
            // Корректировка для правильного сектора
            if (rawAngle < 0.1) index = 0;
            if (index < 0) index = segments.length - 1;
            
            return segments[index];
        }

        // Функция вращения
        function spinWheel() {
            if (isSpinning) return;
            
            isSpinning = true;
            spinButton.disabled = true;
            resultDiv.style.background = '#f0f0f0';
            resultDiv.style.border = '2px dashed #667eea';
            resultDiv.innerHTML = '🎰 Крутим... 🎰';
            
            const spinTime = 4000;
            const spinAngle = Math.random() * 20 + 15;
            const startTime = Date.now();
            const startAngle = currentAngle;
            
            function animateSpin() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinTime, 1);
                
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                currentAngle = startAngle + (spinAngle * Math.PI * 2) * easeProgress;
                
                drawWheel(currentAngle);
                
                if (progress < 1) {
                    spinTimeout = requestAnimationFrame(animateSpin);
                } else {
                    isSpinning = false;
                    spinButton.disabled = false;
                    
                    const prize = getPrize(currentAngle);
                    resultDiv.innerHTML = `🎁 <strong>ТВОЙ ПРИЗ:</strong> ${prize.description}`;
                    resultDiv.style.background = '#d4edda';
                    resultDiv.style.border = '2px solid #28a745';
                }
            }
            
            animateSpin();
        }

        // Инициализация
        drawWheel(currentAngle);

        // Слушаем клик по кнопке и по canvas (для удобства)
        spinButton.addEventListener('click', spinWheel);
        canvas.addEventListener('click', spinWheel);

        // Адаптивность при изменении размера окна
        window.addEventListener('resize', () => {
            drawWheel(currentAngle);
        });

        // Проверка загрузки логотипа (если файл не найден)
        const logo = document.getElementById('centerLogo');
        logo.onerror = function() {
            console.log('Логотип не загружен, проверьте путь images/logo_soc.png');
            // Можно показать заглушку или просто скрыть ошибку
        };
    </script>
</body>
</html>
